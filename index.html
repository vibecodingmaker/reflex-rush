<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reflex Rush - 反射挑戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0a0a1a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      user-select: none;
      overflow: hidden;
    }

    /* TOP BAR */
    #top-bar {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
      border-bottom: 3px solid #fbbf24;
      gap: 8px;
      z-index: 10;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, rgba(251,191,36,0.15) 0%, rgba(251,191,36,0.05) 100%);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 12px;
      padding: 6px 14px;
      min-width: 60px;
    }

    .stat-box .label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .stat-box .value {
      font-size: 20px;
      font-weight: 900;
    }

    .score-val { color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.5); }
    .combo-val { color: #f97316; text-shadow: 0 0 20px rgba(249,115,22,0.5); }
    .time-val { color: #22c55e; text-shadow: 0 0 20px rgba(34,197,94,0.5); }
    .best-val { color: #a78bfa; text-shadow: 0 0 20px rgba(167,139,250,0.5); }

    /* GAME AREA */
    #game-area {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
      overflow: hidden;
      cursor: crosshair;
    }

    /* PARTICLE BACKGROUND */
    .bg-particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(251,191,36,0.3);
      border-radius: 50%;
      pointer-events: none;
      animation: float-particle 8s infinite ease-in-out;
    }

    @keyframes float-particle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-30px) scale(1.5); opacity: 0.6; }
    }

    /* TARGET STYLES */
    .target {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(0);
      animation: target-appear 0.2s forwards;
    }

    @keyframes target-appear {
      0% { transform: scale(0) rotate(-180deg); }
      70% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .target.normal {
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #c0c0c0 100%);
      box-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.4), inset 0 0 20px rgba(0,0,0,0.3);
      border: 3px solid rgba(255,255,255,0.9);
    }

    .target.bonus {
      background: radial-gradient(circle at 30% 30%, #fef08a 0%, #fbbf24 50%, #f97316 100%);
      box-shadow: 0 0 40px rgba(251,191,36,1), 0 0 80px rgba(251,191,36,0.6);
      border: 4px solid #fef08a;
      animation: target-appear 0.2s forwards, glow-bonus 0.6s infinite alternate;
    }

    @keyframes glow-bonus {
      from { box-shadow: 0 0 30px rgba(251,191,36,0.8), 0 0 60px rgba(251,191,36,0.4); }
      to { box-shadow: 0 0 50px rgba(251,191,36,1), 0 0 100px rgba(251,191,36,0.8); }
    }

    .target.penalty {
      background: radial-gradient(circle at 30% 30%, #fca5a5 0%, #ef4444 50%, #991b1b 100%);
      box-shadow: 0 0 30px rgba(239,68,68,0.9), 0 0 60px rgba(239,68,68,0.5);
      border: 3px solid #fca5a5;
      animation: target-appear 0.2s forwards, shake-penalty 0.15s infinite;
    }

    @keyframes shake-penalty {
      0%, 100% { transform: scale(1) translateX(0); }
      25% { transform: scale(1.05) translateX(-3px); }
      75% { transform: scale(1.05) translateX(3px); }
    }

    .target .icon {
      font-size: 28px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .target::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      animation: ring-pulse 1s infinite;
    }

    @keyframes ring-pulse {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    /* TAP EFFECTS */
    .tap-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: ring-expand 0.5s forwards;
    }

    @keyframes ring-expand {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }

    .tap-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
    }

    @keyframes particle-fly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { opacity: 0; }
    }

    .score-popup {
      position: absolute;
      font-size: 24px;
      font-weight: 900;
      pointer-events: none;
      animation: score-float 0.8s forwards;
      text-shadow: 0 0 20px currentColor;
    }

    @keyframes score-float {
      0% { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
    }

    .combo-burst {
      position: absolute;
      font-size: 32px;
      font-weight: 900;
      color: #fbbf24;
      pointer-events: none;
      animation: combo-zoom 0.6s forwards;
      text-shadow: 0 0 30px rgba(251,191,36,1);
    }

    @keyframes combo-zoom {
      0% { transform: scale(0) rotate(-20deg); opacity: 1; }
      50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1.5) translateY(-40px) rotate(0deg); opacity: 0; }
    }

    /* MISS EFFECT */
    .miss-indicator {
      position: absolute;
      font-size: 18px;
      color: #ef4444;
      pointer-events: none;
      animation: miss-shake 0.5s forwards;
    }

    @keyframes miss-shake {
      0%, 100% { transform: translateX(0); opacity: 1; }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); opacity: 0; }
    }

    /* START SCREEN */
    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,26,0.95);
      z-index: 100;
      padding: 20px;
      text-align: center;
    }

    .game-title {
      font-size: clamp(40px, 12vw, 72px);
      font-weight: 900;
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 50%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(251,191,36,0.6));
      margin-bottom: 5px;
      animation: title-glow 2s infinite alternate;
    }

    @keyframes title-glow {
      from { filter: drop-shadow(0 0 20px rgba(251,191,36,0.4)); }
      to { filter: drop-shadow(0 0 40px rgba(251,191,36,0.8)); }
    }

    .game-subtitle {
      font-size: clamp(14px, 4vw, 20px);
      color: #a78bfa;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .cat-mascot {
      font-size: 100px;
      margin-bottom: 20px;
      animation: cat-bounce 1.2s infinite ease-in-out;
      filter: drop-shadow(0 0 30px rgba(251,191,36,0.5));
    }

    @keyframes cat-bounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    .instruction-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 35px;
      max-width: 350px;
    }

    .instruction-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 15px 10px;
      text-align: center;
    }

    .instruction-card .inst-icon { font-size: 36px; margin-bottom: 8px; }
    .instruction-card .inst-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .instruction-card .inst-desc { font-size: 11px; opacity: 0.7; }

    .start-btn {
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 900;
      padding: 20px 70px;
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
      border: none;
      border-radius: 35px;
      color: #0a0a1a;
      cursor: pointer;
      box-shadow: 0 0 50px rgba(251,191,36,0.6), 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: btn-pulse 2s infinite;
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(251,191,36,0.5), 0 10px 30px rgba(0,0,0,0.3); }
      50% { box-shadow: 0 0 70px rgba(251,191,36,0.9), 0 10px 40px rgba(0,0,0,0.4); }
    }

    .start-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 30px rgba(251,191,36,0.4);
    }

    /* RESULT SCREEN */
    #result-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,26,0.97);
      z-index: 100;
      padding: 20px;
      text-align: center;
    }

    #result-screen.show { display: flex; }

    .result-title {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 900;
      color: #fbbf24;
      text-shadow: 0 0 30px rgba(251,191,36,0.6);
      margin-bottom: 15px;
    }

    .result-score {
      font-size: clamp(70px, 18vw, 120px);
      font-weight: 900;
      color: #fbbf24;
      text-shadow: 0 0 60px rgba(251,191,36,0.8);
      animation: score-pulse 1s infinite alternate;
    }

    @keyframes score-pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    .result-best {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 10px;
    }

    .result-new-record {
      font-size: 16px;
      background: linear-gradient(135deg, #fbbf24, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      margin-bottom: 20px;
      animation: record-flash 0.5s infinite alternate;
    }

    @keyframes record-flash {
      from { opacity: 0.8; }
      to { opacity: 1; }
    }

    .result-stats-grid {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .result-stat-card {
      background: linear-gradient(135deg, rgba(251,191,36,0.15) 0%, rgba(251,191,36,0.05) 100%);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 16px;
      padding: 12px 20px;
      text-align: center;
      min-width: 90px;
    }

    .result-stat-card .stat-label { font-size: 10px; opacity: 0.7; margin-bottom: 4px; }
    .result-stat-card .stat-value { font-size: 24px; font-weight: 800; color: #fbbf24; }

    .result-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .result-btn {
      font-size: 16px;
      font-weight: 700;
      padding: 15px 35px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .result-btn:active { transform: scale(0.95); }

    .retry-btn {
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
      color: #0a0a1a;
      box-shadow: 0 0 30px rgba(251,191,36,0.4);
    }

    .share-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      box-shadow: 0 0 20px rgba(79,70,229,0.4);
    }

    /* BOTTOM INFO */
    #bottom-bar {
      padding: 12px;
      background: linear-gradient(0deg, #0f0f23 0%, #1a1a2e 100%);
      border-top: 2px solid rgba(251,191,36,0.3);
      text-align: center;
    }

    .best-footer {
      font-size: 14px;
      opacity: 0.8;
    }

    .best-footer span { color: #fbbf24; font-weight: 800; }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* RESPONSIVE */
    @media (max-height: 650px) {
      .cat-mascot { font-size: 70px; }
      .instruction-grid { gap: 8px; margin-bottom: 20px; }
      .instruction-card { padding: 10px 8px; }
      .instruction-card .inst-icon { font-size: 28px; }
    }
  </style>
</head>
<body>
  <!-- TOP BAR -->
  <div id="top-bar">
    <div class="stat-box">
      <div class="label">分數</div>
      <div class="value score-val" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="label">連擊</div>
      <div class="value combo-val" id="combo">0x</div>
    </div>
    <div class="stat-box">
      <div class="label">時間</div>
      <div class="value time-val" id="time">30</div>
    </div>
    <div class="stat-box">
      <div class="label">最高</div>
      <div class="value best-val" id="best">0</div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game-area">
    <!-- START SCREEN -->
    <div id="start-screen">
      <div class="cat-mascot">🐱</div>
      <div class="game-title">REFLEX RUSH</div>
      <div class="game-subtitle">反射挑戰</div>
      <div class="instruction-grid">
        <div class="instruction-card">
          <div class="inst-icon">⭕</div>
          <div class="inst-name">普通</div>
          <div class="inst-desc">+10分</div>
        </div>
        <div class="instruction-card">
          <div class="inst-icon">⭐</div>
          <div class="inst-name">金牌</div>
          <div class="inst-desc">+30分</div>
        </div>
        <div class="instruction-card">
          <div class="inst-icon">❌</div>
          <div class="inst-name">陷阱</div>
          <div class="inst-desc">別按！</div>
        </div>
      </div>
      <button class="start-btn" id="start-btn">開始遊戲</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen">
      <div class="result-title">遊戲結束！</div>
      <div class="result-score" id="final-score">0</div>
      <div class="result-best" id="result-best">歷史最高：0</div>
      <div class="result-new-record" id="new-record" style="display:none">🎉 新紀錄！</div>
      <div class="result-stats-grid">
        <div class="result-stat-card">
          <div class="stat-label">最高連擊</div>
          <div class="stat-value" id="max-combo">0x</div>
        </div>
        <div class="result-stat-card">
          <div class="stat-label">總點擊</div>
          <div class="stat-value" id="total-taps">0</div>
        </div>
        <div class="result-stat-card">
          <div class="stat-label">準確率</div>
          <div class="stat-value" id="accuracy">0%</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="result-btn retry-btn" id="retry-btn">再玩一次</button>
        <button class="result-btn share-btn" id="share-btn">分享</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div class="best-footer">歷史最高：<span id="best-footer">0</span></div>
  </div>

  <script>
    // GAME STATE
    const state = {
      score: 0,
      combo: 0,
      maxCombo: 0,
      timeLeft: 30,
      isPlaying: false,
      bestScore: parseInt(localStorage.getItem('reflexRushBest')) || 0,
      totalTaps: 0,
      successfulTaps: 0,
      difficulty: 1
    };

    // DOM
    const dom = {
      score: document.getElementById('score'),
      combo: document.getElementById('combo'),
      time: document.getElementById('time'),
      best: document.getElementById('best'),
      bestFooter: document.getElementById('best-footer'),
      gameArea: document.getElementById('game-area'),
      startScreen: document.getElementById('start-screen'),
      resultScreen: document.getElementById('result-screen'),
      startBtn: document.getElementById('start-btn'),
      retryBtn: document.getElementById('retry-btn'),
      shareBtn: document.getElementById('share-btn'),
      finalScore: document.getElementById('final-score'),
      resultBest: document.getElementById('result-best'),
      newRecord: document.getElementById('new-record'),
      maxCombo: document.getElementById('max-combo'),
      totalTaps: document.getElementById('total-taps'),
      accuracy: document.getElementById('accuracy')
    };

    // AUDIO
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, duration, type = 'sine') {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playTap() { playSound(600, 0.1); }
    function playBonus() { playSound(900, 0.15); playSound(1200, 0.1); }
    function playPenalty() { playSound(150, 0.3, 'sawtooth'); }
    function playCombo() { playSound(400 + state.combo * 40, 0.15); }
    function playGameOver() {
      playSound(400, 0.2);
      setTimeout(() => playSound(300, 0.2), 150);
      setTimeout(() => playSound(200, 0.4), 300);
    }

    // PARTICLES
    function createBgParticles() {
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'bg-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        dom.gameArea.appendChild(p);
      }
    }

    // INIT
    function init() {
      dom.best.textContent = state.bestScore;
      dom.bestFooter.textContent = state.bestScore;
      createBgParticles();
      dom.startBtn.addEventListener('click', startGame);
      dom.retryBtn.addEventListener('click', startGame);
      dom.shareBtn.addEventListener('click', shareScore);
    }

    // START
    function startGame() {
      initAudio();
      state.score = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.timeLeft = 30;
      state.isPlaying = true;
      state.totalTaps = 0;
      state.successfulTaps = 0;
      state.difficulty = 1;

      dom.score.textContent = '0';
      dom.combo.textContent = '0x';
      dom.time.textContent = '30';
      dom.startScreen.classList.add('hidden');
      dom.resultScreen.classList.remove('show');

      document.querySelectorAll('.target').forEach(t => t.remove());

      spawnTarget();
      const spawnLoop = () => {
        if (!state.isPlaying) return;
        spawnTarget();
        setTimeout(spawnLoop, getSpawnDelay());
      };
      spawnLoop();

      const timerLoop = setInterval(() => {
        state.timeLeft--;
        dom.time.textContent = state.timeLeft;
        if (state.timeLeft <= 0) {
          clearInterval(timerLoop);
          endGame();
        }
      }, 1000);
    }

    // SPAWN DELAY
    function getSpawnDelay() {
      const baseDelay = 1000;
      const minDelay = 350;
      const reduction = Math.min(state.score / 80, 6) * 100;
      return Math.max(minDelay, baseDelay - reduction);
    }

    // SPAWN TARGET
    function spawnTarget() {
      const rect = dom.gameArea.getBoundingClientRect();
      const padding = 60;
      const maxX = rect.width - padding * 2;
      const maxY = rect.height - padding * 2;

      const rand = Math.random();
      let type = 'normal';
      if (rand < 0.12 + state.difficulty * 0.015) type = 'bonus';
      else if (rand < 0.18) type = 'penalty';

      const baseSize = 55;
      const minSize = 38;
      const sizeRed = Math.min(state.score / 50, 17);
      const size = Math.max(minSize, baseSize - sizeRed);

      const x = padding + Math.random() * maxX;
      const y = padding + Math.random() * maxY;

      const target = document.createElement('div');
      target.className = `target ${type}`;
      target.style.width = size + 'px';
      target.style.height = size + 'px';
      target.style.left = x + 'px';
      target.style.top = y + 'px';

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = type === 'normal' ? '🐱' : type === 'bonus' ? '⭐' : '❌';
      target.appendChild(icon);

      target.addEventListener('click', (e) => handleTap(e, type, target));
      target.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleTap(e, type, target);
      }, { passive: false });

      dom.gameArea.appendChild(target);

      const lifetime = type === 'bonus' ? 1800 : type === 'normal' ? 2800 : 3500;
      setTimeout(() => {
        if (target.parentNode && !target.classList.contains('hit')) {
          target.remove();
        }
      }, lifetime);
    }

    // HANDLE TAP
    function handleTap(e, type, target) {
      if (!state.isPlaying || target.classList.contains('hit')) return;
      target.classList.add('hit');
      e.stopPropagation();
      state.totalTaps++;

      const rect = target.getBoundingClientRect();
      const gameRect = dom.gameArea.getBoundingClientRect();
      const cx = rect.left - gameRect.left + rect.width / 2;
      const cy = rect.top - gameRect.top + rect.height / 2;

      if (type === 'penalty') {
        state.combo = 0;
        dom.combo.textContent = '0x';
        playPenalty();
        createTapEffect(cx, cy, '#ef4444', 8);
        showMissCombo();
        target.remove();
      } else {
        const basePoints = type === 'bonus' ? 30 : 10;
        const points = basePoints * Math.max(1, state.combo);
        state.score += points;
        state.successfulTaps++;
        state.combo++;
        if (state.combo > state.maxCombo) state.maxCombo = state.combo;

        if (type === 'bonus') playBonus();
        else playTap();
        if (state.combo > 0 && state.combo % 5 === 0) playCombo();

        createTapEffect(cx, cy, type === 'bonus' ? '#fbbf24' : '#ffffff', 12);
        showScorePopup(cx, cy, '+' + points, type === 'bonus' ? '#fbbf24' : '#ffffff');

        if (state.combo >= 5) showComboBurst(cx, cy);

        target.remove();
      }

      dom.score.textContent = state.score;
      dom.combo.textContent = state.combo + 'x';

      state.difficulty = 1 + Math.floor(state.score / 120);
    }

    // EFFECTS
    function createTapEffect(x, y, color, particles) {
      // Ring
      const ring = document.createElement('div');
      ring.className = 'tap-ring';
      ring.style.left = (x - 30) + 'px';
      ring.style.top = (y - 30) + 'px';
      ring.style.width = '60px';
      ring.style.height = '60px';
      ring.style.border = `4px solid ${color}`;
      dom.gameArea.appendChild(ring);
      setTimeout(() => ring.remove(), 500);

      // Particles
      for (let i = 0; i < particles; i++) {
        const p = document.createElement('div');
        p.className = 'tap-particle';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.background = color;

        const angle = (i / particles) * Math.PI * 2;
        const dist = 40 + Math.random() * 40;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;

        p.style.animation = 'none';
        p.animate([
          { transform: 'translate(0,0) scale(1)', opacity: 1 },
          { transform: `translate(${tx}px,${ty}px) scale(0)`, opacity: 0 }
        ], { duration: 400, easing: 'ease-out' });

        dom.gameArea.appendChild(p);
        setTimeout(() => p.remove(), 400);
      }
    }

    function showScorePopup(x, y, text, color) {
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = text;
      popup.style.left = (x - 30) + 'px';
      popup.style.top = (y - 20) + 'px';
      popup.style.color = color;
      dom.gameArea.appendChild(popup);
      setTimeout(() => popup.remove(), 800);
    }

    function showComboBurst(x, y) {
      const burst = document.createElement('div');
      burst.className = 'combo-burst';
      burst.textContent = state.combo + 'x COMBO!';
      burst.style.left = (x - 80) + 'px';
      burst.style.top = (y - 40) + 'px';
      dom.gameArea.appendChild(burst);
      setTimeout(() => burst.remove(), 600);
    }

    function showMissCombo() {
      const miss = document.createElement('div');
      miss.className = 'miss-indicator';
      miss.textContent = 'COMBO LOST';
      miss.style.left = '50%';
      miss.style.top = '50%';
      miss.style.transform = 'translate(-50%, -50%)';
      dom.gameArea.appendChild(miss);
      setTimeout(() => miss.remove(), 500);
    }

    // END
    function endGame() {
      state.isPlaying = false;
      playGameOver();

      document.querySelectorAll('.target').forEach(t => t.remove());

      const isNewBest = state.score > state.bestScore;
      if (isNewBest) {
        state.bestScore = state.score;
        localStorage.setItem('reflexRushBest', state.bestScore);
        dom.best.textContent = state.bestScore;
        dom.bestFooter.textContent = state.bestScore;
      }

      dom.finalScore.textContent = state.score;
      dom.resultBest.textContent = '歷史最高：' + state.bestScore;
      dom.newRecord.style.display = isNewBest ? 'block' : 'none';
      dom.maxCombo.textContent = state.maxCombo + 'x';
      dom.totalTaps.textContent = state.totalTaps;
      dom.accuracy.textContent = state.totalTaps > 0 ? Math.round((state.successfulTaps / state.totalTaps) * 100) + '%' : '0%';

      dom.resultScreen.classList.add('show');
    }

    // SHARE
    function shareScore() {
      const text = `🐱 Reflex Rush 🏆\n\n分數：${state.score}\n最高連擊：${state.maxCombo}x\n\n挑戰你的反射神經！\nhttps://peppy-palmier-f84ccb.netlify.app`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          dom.shareBtn.textContent = '已複製！';
          setTimeout(() => dom.shareBtn.textContent = '分享', 2000);
        });
      }
    }

    init();
  </script>
</body>
</html>
