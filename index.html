<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reflex Rush - 反射挑戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0c29 100%);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      user-select: none;
    }

    /* TOP BAR - 12% */
    #top-bar {
      flex: 0 0 12%;
      max-height: 12%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%);
      border-bottom: 2px solid rgba(251,191,36,0.3);
    }

    .stat-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 65px;
    }

    .stat-card .label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .stat-card .value {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 900;
    }

    .score-card .value { color: #fbbf24; }
    .combo-card .value { color: #f97316; }
    .time-card .value { color: #22c55e; }
    .best-card .value { color: #a78bfa; }

    /* GAME AREA - 68% */
    #game-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(30,30,60,0.8) 0%, rgba(10,10,20,0.9) 100%);
      overflow: hidden;
    }

    #game-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      touch-action: none;
    }

    /* START SCREEN */
    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      padding: 20px;
      text-align: center;
    }

    #start-screen h1 {
      font-size: clamp(32px, 8vw, 56px);
      font-weight: 900;
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      margin-bottom: 10px;
    }

    #start-screen .subtitle {
      font-size: clamp(14px, 3.5vw, 20px);
      opacity: 0.8;
      margin-bottom: 30px;
    }

    #start-screen .cat-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .instructions {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .instruction-item {
      background: rgba(255,255,255,0.1);
      padding: 10px 15px;
      border-radius: 12px;
      font-size: 12px;
    }

    .instruction-item .icon { font-size: 24px; margin-bottom: 5px; }
    .instruction-item .text { opacity: 0.8; }

    .start-btn {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 800;
      padding: 18px 60px;
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
      border: none;
      border-radius: 30px;
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(251,191,36,0.5);
      animation: pulse-btn 2s infinite;
      transition: transform 0.1s;
    }

    .start-btn:active { transform: scale(0.95); }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 30px rgba(251,191,36,0.5); }
      50% { box-shadow: 0 0 50px rgba(251,191,36,0.8); }
    }

    /* RESULT SCREEN */
    #result-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.92);
      z-index: 15;
      padding: 20px;
      text-align: center;
    }

    #result-screen.show { display: flex; }

    #result-screen h2 {
      font-size: clamp(28px, 7vw, 42px);
      margin-bottom: 20px;
      color: #fbbf24;
    }

    .result-score {
      font-size: clamp(60px, 15vw, 100px);
      font-weight: 900;
      color: #fbbf24;
      text-shadow: 0 0 40px rgba(251,191,36,0.6);
      margin-bottom: 10px;
    }

    .result-best {
      font-size: clamp(16px, 4vw, 22px);
      color: #a78bfa;
      margin-bottom: 20px;
    }

    .result-improvement {
      font-size: clamp(14px, 3.5vw, 18px);
      padding: 8px 20px;
      background: rgba(34,197,94,0.2);
      border-radius: 20px;
      margin-bottom: 30px;
      color: #4ade80;
    }

    .result-stats {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .result-stat {
      background: rgba(255,255,255,0.1);
      padding: 12px 20px;
      border-radius: 15px;
      text-align: center;
    }

    .result-stat .label { font-size: 11px; opacity: 0.7; margin-bottom: 3px; }
    .result-stat .value { font-size: clamp(18px, 4.5vw, 24px); font-weight: 800; color: #fbbf24; }

    .result-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 700;
      padding: 14px 30px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .action-btn:active { transform: scale(0.95); }

    .retry-btn {
      background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
      color: #1a1a2e;
    }

    .share-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
    }

    /* BOTTOM BAR - 20% */
    #bottom-bar {
      flex: 0 0 20%;
      max-height: 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%);
      border-top: 2px solid rgba(251,191,36,0.3);
      gap: 10px;
    }

    .best-score-display {
      font-size: clamp(14px, 3.5vw, 18px);
      opacity: 0.9;
      text-align: center;
    }

    .best-score-display span { color: #fbbf24; font-weight: 800; }

    /* TARGET STYLES */
    .target {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .target:active { transform: scale(0.9); }

    .target.normal {
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #a0a0a0 100%);
      box-shadow: 0 0 20px rgba(255,255,255,0.5), inset 0 0 20px rgba(0,0,0,0.2);
    }

    .target.bonus {
      background: radial-gradient(circle at 30% 30%, #fcd34d 0%, #f97316 100%);
      box-shadow: 0 0 30px rgba(251,191,36,0.8), inset 0 0 15px rgba(255,255,255,0.5);
      animation: glow-bonus 0.5s infinite alternate;
    }

    @keyframes glow-bonus {
      from { box-shadow: 0 0 20px rgba(251,191,36,0.6); }
      to { box-shadow: 0 0 40px rgba(251,191,36,1); }
    }

    .target.penalty {
      background: radial-gradient(circle at 30% 30%, #ef4444 0%, #991b1b 100%);
      box-shadow: 0 0 25px rgba(239,68,68,0.7);
      animation: pulse-penalty 0.3s infinite alternate;
    }

    @keyframes pulse-penalty {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .target .inner {
      font-size: clamp(16px, 4vw, 24px);
    }

    /* TAP EFFECTS */
    .tap-effect {
      position: absolute;
      pointer-events: none;
      animation: tap-burst 0.4s forwards;
    }

    @keyframes tap-burst {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .tap-effect.normal { border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; }
    .tap-effect.bonus { border: 4px solid #fbbf24; border-radius: 50%; }
    .tap-effect.penalty { border: 4px solid #ef4444; border-radius: 50%; }

    /* COMBO POPUP */
    .combo-popup {
      position: absolute;
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 900;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251,191,36,0.8);
      pointer-events: none;
      animation: combo-float 0.8s forwards;
    }

    @keyframes combo-float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.3); opacity: 0; }
    }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* RESPONSIVE */
    @media (max-height: 600px) {
      #top-bar { flex: 0 0 10%; max-height: 10%; padding: 4px 8px; }
      #bottom-bar { flex: 0 0 15%; max-height: 15%; }
      .stat-card { padding: 4px 8px; min-width: 50px; }
      .stat-card .value { font-size: 14px; }
    }

    @media (max-width: 360px) {
      .stat-card { min-width: 50px; padding: 4px 6px; }
      .stat-card .label { font-size: 8px; }
    }
  </style>
</head>
<body>
  <!-- TOP BAR -->
  <div id="top-bar">
    <div class="stat-card score-card">
      <div class="label">分數</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="stat-card combo-card">
      <div class="label">連擊</div>
      <div class="value" id="combo">0x</div>
    </div>
    <div class="stat-card time-card">
      <div class="label">時間</div>
      <div class="value" id="time">30</div>
    </div>
    <div class="stat-card best-card">
      <div class="label">最佳</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game-area">
    <div id="game-canvas"></div>

    <!-- START SCREEN -->
    <div id="start-screen">
      <div class="cat-icon">🐱</div>
      <h1>REFLEX RUSH</h1>
      <p class="subtitle">反射挑戰 - 測試你的反應速度！</p>
      <div class="instructions">
        <div class="instruction-item">
          <div class="icon">⭕</div>
          <div class="text">普通白點<br>+10分</div>
        </div>
        <div class="instruction-item">
          <div class="icon">⭐</div>
          <div class="text">金牌<br>+30分</div>
        </div>
        <div class="instruction-item">
          <div class="icon">❌</div>
          <div class="text">紅色陷阱<br>小心！</div>
        </div>
      </div>
      <button class="start-btn" id="start-btn">開始遊戲</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen">
      <h2>遊戲結束！</h2>
      <div class="result-score" id="final-score">0</div>
      <div class="result-best" id="result-best">歷史最高：0</div>
      <div class="result-improvement" id="improvement"></div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="label">最高連擊</div>
          <div class="value" id="max-combo">0x</div>
        </div>
        <div class="result-stat">
          <div class="label">總點擊</div>
          <div class="value" id="total-taps">0</div>
        </div>
        <div class="result-stat">
          <div class="label">準確率</div>
          <div class="value" id="accuracy">0%</div>
        </div>
      </div>
      <div class="result-actions">
        <button class="action-btn retry-btn" id="retry-btn">再玩一次</button>
        <button class="action-btn share-btn" id="share-btn">分享分數</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div class="best-score-display">歷史最高：<span id="best-score-bottom">0</span></div>
  </div>

  <script>
    // GAME STATE
    const state = {
      score: 0,
      combo: 0,
      maxCombo: 0,
      timeLeft: 30,
      isPlaying: false,
      bestScore: parseInt(localStorage.getItem('reflexRushBest')) || 0,
      totalTaps: 0,
      successfulTaps: 0,
      targets: [],
      spawnInterval: null,
      timerInterval: null,
      difficulty: 1
    };

    // DOM ELEMENTS
    const dom = {
      score: document.getElementById('score'),
      combo: document.getElementById('combo'),
      time: document.getElementById('time'),
      best: document.getElementById('best'),
      bestBottom: document.getElementById('best-score-bottom'),
      gameArea: document.getElementById('game-area'),
      gameCanvas: document.getElementById('game-canvas'),
      startScreen: document.getElementById('start-screen'),
      resultScreen: document.getElementById('result-screen'),
      startBtn: document.getElementById('start-btn'),
      retryBtn: document.getElementById('retry-btn'),
      shareBtn: document.getElementById('share-btn'),
      finalScore: document.getElementById('final-score'),
      resultBest: document.getElementById('result-best'),
      improvement: document.getElementById('improvement'),
      maxCombo: document.getElementById('max-combo'),
      totalTaps: document.getElementById('total-taps'),
      accuracy: document.getElementById('accuracy')
    };

    // AUDIO CONTEXT
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'tap') {
        osc.frequency.value = 600;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'bonus') {
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'penalty') {
        osc.frequency.value = 200;
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'combo') {
        osc.frequency.value = 400 + state.combo * 50;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'gameover') {
        osc.frequency.value = 300;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      }
    }

    // INITIALIZE
    function init() {
      dom.best.textContent = state.bestScore;
      dom.bestBottom.textContent = state.bestScore;
      dom.startBtn.addEventListener('click', startGame);
      dom.retryBtn.addEventListener('click', startGame);
      dom.shareBtn.addEventListener('click', shareScore);
    }

    // START GAME
    function startGame() {
      initAudio();
      state.score = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.timeLeft = 30;
      state.isPlaying = true;
      state.totalTaps = 0;
      state.successfulTaps = 0;
      state.difficulty = 1;

      dom.score.textContent = '0';
      dom.combo.textContent = '0x';
      dom.time.textContent = '30';
      dom.startScreen.classList.add('hidden');
      dom.resultScreen.classList.remove('show');

      // Clear existing targets
      document.querySelectorAll('.target').forEach(t => t.remove());

      // Start spawning
      spawnTarget();
      state.spawnInterval = setInterval(() => {
        if (state.isPlaying) spawnTarget();
      }, getSpawnDelay());

      // Start timer
      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        dom.time.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endGame();
      }, 1000);
    }

    // GET SPAWN DELAY BASED ON DIFFICULTY
    function getSpawnDelay() {
      const baseDelay = 1200;
      const minDelay = 400;
      const reduction = Math.min(state.score / 50, 8) * 100;
      return Math.max(minDelay, baseDelay - reduction);
    }

    // SPAWN TARGET
    function spawnTarget() {
      const gameRect = dom.gameArea.getBoundingClientRect();
      const padding = 50;
      const maxX = gameRect.width - padding * 2;
      const maxY = gameRect.height - padding * 2;

      // Determine target type based on difficulty
      const rand = Math.random();
      let type = 'normal';
      if (rand < 0.1 + state.difficulty * 0.02) type = 'bonus';
      else if (rand < 0.15) type = 'penalty';

      // Size based on difficulty
      const baseSize = 50;
      const minSize = 30;
      const sizeReduction = Math.min(state.score / 30, 20);
      const size = Math.max(minSize, baseSize - sizeReduction);

      // Random position
      const x = padding + Math.random() * maxX;
      const y = padding + Math.random() * maxY;

      // Create target element
      const target = document.createElement('div');
      target.className = `target ${type}`;
      target.style.width = size + 'px';
      target.style.height = size + 'px';
      target.style.left = x + 'px';
      target.style.top = y + 'px';

      // Inner content
      const inner = document.createElement('span');
      inner.className = 'inner';
      if (type === 'normal') inner.textContent = '🐱';
      else if (type === 'bonus') inner.textContent = '⭐';
      else inner.textContent = '❌';
      target.appendChild(inner);

      // Click handler
      target.addEventListener('click', (e) => handleTap(e, type, target));
      target.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleTap(e, type, target);
      }, { passive: false });

      dom.gameArea.appendChild(target);

      // Auto remove after timeout
      const lifetime = type === 'bonus' ? 1500 : 2500;
      setTimeout(() => {
        if (target.parentNode && type !== 'penalty') {
          target.remove();
        }
      }, lifetime);
    }

    // HANDLE TAP
    function handleTap(e, type, target) {
      if (!state.isPlaying) return;
      e.stopPropagation();
      state.totalTaps++;

      const rect = target.getBoundingClientRect();
      const gameRect = dom.gameArea.getBoundingClientRect();
      const centerX = rect.left - gameRect.left + rect.width / 2;
      const centerY = rect.top - gameRect.top + rect.height / 2;

      if (type === 'penalty') {
        // Penalty - lose combo
        state.combo = 0;
        dom.combo.textContent = '0x';
        playSound('penalty');
        showTapEffect(centerX, centerY, 'penalty');
        target.remove();
      } else if (type === 'bonus') {
        // Bonus - 3x points with multiplier
        const points = 30 * Math.max(1, state.combo);
        state.score += points;
        state.successfulTaps++;
        state.combo++;
        if (state.combo > state.maxCombo) state.maxCombo = state.combo;
        playSound('bonus');
        showTapEffect(centerX, centerY, 'bonus');
        if (state.combo >= 5) showComboPopup(centerX, centerY);
        target.remove();
      } else {
        // Normal target
        const points = 10 * Math.max(1, state.combo);
        state.score += points;
        state.successfulTaps++;
        state.combo++;
        if (state.combo > state.maxCombo) state.maxCombo = state.combo;
        playSound('tap');
        if (state.combo % 5 === 0 && state.combo > 0) playSound('combo');
        showTapEffect(centerX, centerY, 'normal');
        if (state.combo >= 5) showComboPopup(centerX, centerY);
        target.remove();
      }

      dom.score.textContent = state.score;
      dom.combo.textContent = state.combo + 'x';

      // Update difficulty and spawn rate
      state.difficulty = 1 + Math.floor(state.score / 100);
      clearInterval(state.spawnInterval);
      state.spawnInterval = setInterval(() => {
        if (state.isPlaying) spawnTarget();
      }, getSpawnDelay());
    }

    // SHOW TAP EFFECT
    function showTapEffect(x, y, type) {
      const effect = document.createElement('div');
      effect.className = `tap-effect ${type}`;
      effect.style.left = (x - 25) + 'px';
      effect.style.top = (y - 25) + 'px';
      effect.style.width = '50px';
      effect.style.height = '50px';
      dom.gameArea.appendChild(effect);
      setTimeout(() => effect.remove(), 400);
    }

    // SHOW COMBO POPUP
    function showComboPopup(x, y) {
      const popup = document.createElement('div');
      popup.className = 'combo-popup';
      popup.textContent = state.combo + 'x COMBO!';
      popup.style.left = (x - 60) + 'px';
      popup.style.top = (y - 30) + 'px';
      dom.gameArea.appendChild(popup);
      setTimeout(() => popup.remove(), 800);
    }

    // END GAME
    function endGame() {
      state.isPlaying = false;
      clearInterval(state.spawnInterval);
      clearInterval(state.timerInterval);
      playSound('gameover');

      // Clear remaining targets
      document.querySelectorAll('.target').forEach(t => t.remove());

      // Update best score
      const isNewBest = state.score > state.bestScore;
      if (isNewBest) {
        state.bestScore = state.score;
        localStorage.setItem('reflexRushBest', state.bestScore);
        dom.best.textContent = state.bestScore;
        dom.bestBottom.textContent = state.bestScore;
      }

      // Show results
      dom.finalScore.textContent = state.score;
      dom.resultBest.textContent = '歷史最高：' + state.bestScore;

      if (isNewBest) {
        dom.improvement.textContent = '🎉 新紀錄！';
        dom.improvement.style.background = 'rgba(251,191,36,0.2)';
        dom.improvement.style.color = '#fbbf24';
      } else {
        const improvement = state.bestScore > 0
          ? Math.round((state.score / state.bestScore - 1) * 100)
          : 0;
        dom.improvement.textContent = improvement > 0 ? `比上次進步 ${improvement}%` : '再接再厲！';
        dom.improvement.style.background = 'rgba(34,197,94,0.2)';
        dom.improvement.style.color = '#4ade80';
      }

      dom.maxCombo.textContent = state.maxCombo + 'x';
      dom.totalTaps.textContent = state.totalTaps;
      dom.accuracy.textContent = state.totalTaps > 0
        ? Math.round((state.successfulTaps / state.totalTaps) * 100) + '%'
        : '0%';

      dom.resultScreen.classList.add('show');
    }

    // SHARE SCORE
    function shareScore() {
      const text = `🐱 Reflex Rush 🏆\n\n分數：${state.score}\n最高連擊：${state.maxCombo}x\n\n挑戰你的反射神經！`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          dom.shareBtn.textContent = '已複製！';
          setTimeout(() => dom.shareBtn.textContent = '分享分數', 2000);
        });
      }
    }

    // START
    init();
  </script>
</body>
</html>
